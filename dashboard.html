<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Firewall — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #060b14;
      --bg2:     #0d1526;
      --bg3:     #111f35;
      --border:  #1e293b;
      --amber:   #f59e0b;
      --amber2:  #fbbf24;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #60a5fa;
      --purple:  #a78bfa;
      --slate1:  #f1f5f9;
      --slate2:  #94a3b8;
      --slate3:  #475569;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', sans-serif;
      --display: 'Space Grotesk', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--slate1); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-icon { font-size: 48px; margin-bottom: 20px; }

    .login-title {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 700;
      color: var(--slate1);
      margin-bottom: 8px;
    }

    .login-sub { font-size: 14px; color: var(--slate3); margin-bottom: 32px; line-height: 1.6; }

    .input-label { display: block; font-size: 12px; color: var(--slate3); text-align: left; margin-bottom: 6px; font-family: var(--mono); letter-spacing: 0.08em; }

    .key-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--slate1);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .key-input:focus { border-color: var(--amber); }
    .key-input::placeholder { color: var(--slate3); }

    .btn-login {
      width: 100%;
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      margin-top: 12px;
      font-size: 13px;
      color: var(--red);
      font-family: var(--mono);
    }

    /* ── DASHBOARD ── */
    .dashboard { display: none; }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,11,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: var(--display);
      font-size: 17px;
      font-weight: 700;
      color: var(--slate1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-brand span { color: var(--amber); }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-plan {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--amber);
      text-transform: uppercase;
    }

    .nav-email { font-size: 13px; color: var(--slate3); }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--slate3);
      font-size: 12px;
      font-family: var(--mono);
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: var(--slate1); border-color: var(--slate3); }

    /* MAIN CONTENT */
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }

    .page-title {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
      color: var(--slate1);
      margin-bottom: 4px;
    }

    .page-sub { font-size: 13px; color: var(--slate3); margin-bottom: 32px; }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.amber::before { background: var(--amber); }
    .stat-card.green::before  { background: var(--green); }
    .stat-card.red::before    { background: var(--red); }
    .stat-card.blue::before   { background: var(--blue); }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--slate3);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--display);
      font-size: 32px;
      font-weight: 700;
      color: var(--slate1);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.blue  { color: var(--blue); }

    .stat-sub { font-size: 12px; color: var(--slate3); }

    /* TWO COL */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* PANELS */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
    }

    .panel-title {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 600;
      color: var(--slate1);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--slate3);
    }

    /* USAGE BAR */
    .usage-wrap { margin-bottom: 14px; }
    .usage-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .usage-text { font-size: 13px; color: var(--slate2); }
    .usage-pct  { font-family: var(--mono); font-size: 13px; color: var(--amber); }
    .usage-bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .usage-bar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.8s ease; }
    .usage-bar-fill.danger { background: var(--red); }

    /* ATTACK BREAKDOWN */
    .breakdown-list { display: flex; flex-direction: column; gap: 10px; }

    .breakdown-item { display: flex; flex-direction: column; gap: 4px; }

    .breakdown-row { display: flex; justify-content: space-between; align-items: center; }
    .breakdown-name { font-size: 12px; color: var(--slate2); }
    .breakdown-count { font-family: var(--mono); font-size: 12px; color: var(--slate3); }
    .breakdown-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

    /* ACCOUNT */
    .account-list { display: flex; flex-direction: column; gap: 12px; }

    .account-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .account-row:last-child { border-bottom: none; padding-bottom: 0; }

    .account-key-label { font-size: 13px; color: var(--slate3); }
    .account-val { font-family: var(--mono); font-size: 12px; color: var(--slate2); }
    .account-val.amber { color: var(--amber); }
    .account-val.green { color: var(--green); }

    .key-display {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .key-masked { font-family: var(--mono); font-size: 12px; color: var(--slate2); }

    .btn-copy {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--slate3);
      font-size: 10px;
      font-family: var(--mono);
      padding: 3px 7px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .btn-copy:hover { color: var(--amber); border-color: var(--amber); }

    /* LOG TABLE */
    .log-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .log-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
    }

    .log-scroll { max-height: 360px; overflow-y: auto; }
    .log-scroll::-webkit-scrollbar { width: 3px; }
    .log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: grid;
      grid-template-columns: 140px 60px 1fr;
      align-items: center;
      gap: 16px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .log-entry:last-child { border-bottom: none; }
    .log-entry:hover { background: var(--bg3); }

    .log-time { font-family: var(--mono); font-size: 11px; color: var(--slate3); }

    .log-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      text-align: center;
      letter-spacing: 0.06em;
    }

    .log-badge.passed { background: #14532d44; color: var(--green); border: 1px solid #22c55e33; }
    .log-badge.blocked { background: #7f1d1d44; color: var(--red); border: 1px solid #ef444433; }

    .log-msg { font-family: var(--mono); font-size: 11px; color: var(--slate3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-reason { font-size: 11px; color: var(--slate3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .log-empty {
      padding: 48px;
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--border);
    }

    /* REFRESH */
    .btn-refresh {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--slate3);
      font-size: 12px;
      font-family: var(--mono);
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .btn-refresh:hover { color: var(--amber); border-color: var(--amber); }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 10px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--slate3);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🛡️</div>
    <div class="login-title">Prompt Firewall</div>
    <p class="login-sub">Enter your API key to view your security dashboard.</p>
    <label class="input-label">YOUR API KEY</label>
    <input class="key-input" id="keyInput" type="password" placeholder="pf_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
    <button class="btn-login" id="loginBtn" onclick="login()">View Dashboard</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <nav class="nav">
    <div class="nav-brand">🛡️ Prompt <span>Firewall</span></div>
    <div class="nav-right">
      <a href="index.html" style="font-size:12px;color:var(--slate3);text-decoration:none;font-family:var(--mono);">← Home</a>
      <span class="nav-plan" id="navPlan">starter</span>
      <span class="nav-email" id="navEmail"></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Loading your dashboard…</div>
  </div>

</div>

<script>
  const API = "https://prompt-firewall-production.up.railway.app";
  let currentKey = "";
  let dashData = null;

  // ── Login ──────────────────────────────────────────────────────────────
  async function login() {
    const key = document.getElementById("keyInput").value.trim();
    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("loginError");

    if (!key) { err.textContent = "Please enter your API key."; return; }

    btn.disabled = true;
    btn.textContent = "Checking…";
    err.textContent = "";

    try {
      const res = await fetch(`${API}/my-log?limit=50`, {
        headers: { "X-API-Key": key }
      });

      if (res.status === 403) {
        err.textContent = "Invalid API key. Check your email for the correct key.";
        btn.disabled = false;
        btn.textContent = "View Dashboard";
        return;
      }

      const data = await res.json();
      currentKey = key;
      dashData = data;
      showDashboard(data);

    } catch (e) {
      err.textContent = "Connection error. Please try again.";
      btn.disabled = false;
      btn.textContent = "View Dashboard";
    }
  }

  document.getElementById("keyInput").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  // ── Logout ─────────────────────────────────────────────────────────────
  function logout() {
    currentKey = "";
    dashData = null;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("keyInput").value = "";
    document.getElementById("loginBtn").disabled = false;
    document.getElementById("loginBtn").textContent = "View Dashboard";
  }

  // ── Show Dashboard ─────────────────────────────────────────────────────
  function showDashboard(data) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    const acc = data.account;
    const stats = data.stats;
    const breakdown = data.attack_breakdown;
    const events = data.recent_events;

    document.getElementById("navPlan").textContent = acc.plan.toUpperCase();
    document.getElementById("navEmail").textContent = acc.email;

    const used = acc.requests_used;
    const limit = acc.monthly_limit;
    const pct = limit > 0 ? Math.min(100, Math.round((used / limit) * 100)) : 0;
    const remaining = acc.requests_remaining;

    // Attack breakdown colors
    const catColors = {
      "Prompt Injection": "#a78bfa",
      "SQL Injection":    "#ef4444",
      "XSS":             "#f59e0b",
      "Command Injection":"#22c55e",
      "Log4Shell / XXE": "#60a5fa",
      "Obfuscation":     "#f472b6",
    };

    const maxBreakdown = Math.max(1, ...Object.values(breakdown));

    const memberDate = new Date(acc.member_since).toLocaleDateString("en-ZA", { year: "numeric", month: "long", day: "numeric" });

    document.getElementById("mainContent").innerHTML = `
      <div class="fade-in">
        <div class="page-title">Security Dashboard</div>
        <div class="page-sub">Welcome back — here's your firewall activity overview.</div>

        <!-- STAT CARDS -->
        <div class="stats-grid">
          <div class="stat-card amber">
            <div class="stat-label">Total Requests</div>
            <div class="stat-value amber">${used.toLocaleString()}</div>
            <div class="stat-sub">All time</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Passed</div>
            <div class="stat-value green">${stats.passed.toLocaleString()}</div>
            <div class="stat-sub">Safe messages forwarded</div>
          </div>
          <div class="stat-card red">
            <div class="stat-label">Blocked</div>
            <div class="stat-value red">${stats.blocked.toLocaleString()}</div>
            <div class="stat-sub">Attacks stopped</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">Block Rate</div>
            <div class="stat-value blue">${stats.block_rate}%</div>
            <div class="stat-sub">Of all messages</div>
          </div>
        </div>

        <!-- TWO COL -->
        <div class="two-col">

          <!-- Usage + Attack breakdown -->
          <div style="display:flex;flex-direction:column;gap:20px;">

            <div class="panel">
              <div class="panel-title">Monthly Usage <span class="panel-label">${acc.plan} plan</span></div>
              <div class="usage-wrap">
                <div class="usage-row">
                  <span class="usage-text">${used.toLocaleString()} used</span>
                  <span class="usage-pct">${limit > 0 ? pct + "%" : "Unlimited"}</span>
                </div>
                <div class="usage-bar-bg">
                  <div class="usage-bar-fill ${pct > 85 ? "danger" : ""}" style="width:${limit > 0 ? pct : 0}%"></div>
                </div>
                <div style="font-size:12px;color:var(--slate3);margin-top:8px;">
                  ${limit > 0 ? `${typeof remaining === "number" ? remaining.toLocaleString() : remaining} requests remaining` : "Unlimited requests on Business plan"}
                </div>
              </div>
            </div>

            <div class="panel">
              <div class="panel-title">Attack Breakdown</div>
              <div class="breakdown-list">
                ${Object.entries(breakdown).map(([name, count]) => `
                  <div class="breakdown-item">
                    <div class="breakdown-row">
                      <span class="breakdown-name">${name}</span>
                      <span class="breakdown-count">${count}</span>
                    </div>
                    <div class="breakdown-bar-bg">
                      <div class="breakdown-bar-fill" style="width:${Math.round((count/maxBreakdown)*100)}%;background:${catColors[name] || "#94a3b8"}"></div>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>

          </div>

          <!-- Account info -->
          <div class="panel">
            <div class="panel-title">Account</div>
            <div class="account-list">
              <div class="account-row">
                <span class="account-key-label">Email</span>
                <span class="account-val">${acc.email}</span>
              </div>
              <div class="account-row">
                <span class="account-key-label">Plan</span>
                <span class="account-val amber">${acc.plan.charAt(0).toUpperCase() + acc.plan.slice(1)}</span>
              </div>
              <div class="account-row">
                <span class="account-key-label">Status</span>
                <span class="account-val green">● Active</span>
              </div>
              <div class="account-row">
                <span class="account-key-label">Member since</span>
                <span class="account-val">${memberDate}</span>
              </div>
              <div class="account-row">
                <span class="account-key-label">Monthly limit</span>
                <span class="account-val">${limit > 0 ? limit.toLocaleString() + " requests" : "Unlimited"}</span>
              </div>
              <div class="account-row">
                <span class="account-key-label">API Key</span>
                <div class="key-display">
                  <span class="key-masked" id="keyMasked">${currentKey.slice(0,6)}••••••••••••••••</span>
                  <button class="btn-copy" onclick="copyKey()">Copy</button>
                </div>
              </div>
              <div class="account-row">
                <span class="account-key-label">API Endpoint</span>
                <button class="btn-copy" onclick="copyEndpoint()">Copy URL</button>
              </div>
            </div>

            <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
              <div style="font-size:12px;color:var(--slate3);margin-bottom:10px;">Need help or want to upgrade?</div>
              <a href="mailto:info@invenova.tech" style="font-size:13px;color:var(--amber);text-decoration:none;">info@invenova.tech →</a>
            </div>
          </div>

        </div>

        <!-- SECURITY LOG -->
        <div class="log-wrap">
          <div class="log-header-row">
            <div class="panel-title" style="margin:0">Security Log <span class="panel-label" style="margin-left:10px;">last ${events.length} events</span></div>
            <button class="btn-refresh" onclick="refresh()">↻ Refresh</button>
          </div>
          <div class="log-scroll">
            ${events.length === 0
              ? `<div class="log-empty">// no events yet — send your first request to see it here</div>`
              : events.map(e => `
                <div class="log-entry">
                  <span class="log-time">${new Date(e.timestamp).toLocaleString("en-ZA", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })}</span>
                  <span class="log-badge ${e.status.toLowerCase()}">${e.status}</span>
                  <span class="log-msg" title="${e.reason}">${e.message_preview} <span style="color:var(--slate3);font-size:10px;">— ${e.reason}</span></span>
                </div>
              `).join("")
            }
          </div>
        </div>

      </div>
    `;
  }

  // ── Refresh ────────────────────────────────────────────────────────────
  async function refresh() {
    try {
      const res = await fetch(`${API}/my-log?limit=50`, {
        headers: { "X-API-Key": currentKey }
      });
      const data = await res.json();
      dashData = data;
      showDashboard(data);
    } catch (e) {
      console.error("Refresh failed", e);
    }
  }

  // ── Copy helpers ───────────────────────────────────────────────────────
  function copyKey() {
    navigator.clipboard.writeText(currentKey);
    event.target.textContent = "Copied!";
    setTimeout(() => event.target.textContent = "Copy", 1500);
  }

  function copyEndpoint() {
    navigator.clipboard.writeText(`${API}/analyze`);
    event.target.textContent = "Copied!";
    setTimeout(() => event.target.textContent = "Copy URL", 1500);
  }
</script>
